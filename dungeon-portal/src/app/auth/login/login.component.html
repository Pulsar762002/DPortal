<section class="login-page">
  <div class="login-card">

    <h1>Accedi al Portale</h1>
    <p class="subtitle">Entra nel mondo delle tue campagne</p>

    <form (ngSubmit)="onLogin()">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />

      <button type="submit">Accedi</button>
    </form>

    <p class="switch">
      Non hai un account?
      <a routerLink="/register">Registrati</a>
    </p>

    <div *ngIf="error" class="error">
      {{ error }}
    </div>

  </div>
</section>
