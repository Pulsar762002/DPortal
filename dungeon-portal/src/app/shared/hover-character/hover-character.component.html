<span class="character-name"
      (mouseenter)="show()"
      (mouseleave)="hide()">

  {{ nome }}

  <div class="hover-card" *ngIf="isVisible">
    <app-personaggio-card
      [nome]="nome"
      [specieClasse]="specieClasse"
      [descrizione]="descrizione"
      [ruolo]="ruolo"
      [immagine]="immagine">
    </app-personaggio-card>
  </div>

</span>
