<div class="luogo-wrapper">

  <div class="luogo-image">
    <img [src]="immagine" [alt]="nome">
  </div>

  <div class="luogo-content">

    <h3 class="luogo-nome">
      {{ nome }}
    </h3>

    <ul class="luogo-info">

      <li>
        <strong>Descrizione:</strong>
        {{ descrizione }}
      </li>


    </ul>

  </div>

</div>
